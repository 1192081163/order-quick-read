name: Build Desktop Apps

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: email-order-reader-windows
          path: dist/Email Order Reader

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

      - name: Build package
        shell: bash
        run: bash scripts/build_macos.sh

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: email-order-reader-macos
          path: dist/Email Order Reader.app
