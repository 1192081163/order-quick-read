name: Build Desktop Apps

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build package
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Upload Windows package
        uses: actions/upload-artifact@v7
        with:
          name: email-order-reader-windows
          path: dist/Email Order Reader

      - name: Upload direct Windows executable
        uses: actions/upload-artifact@v7
        with:
          name: EmailOrderReader.exe
          path: dist/EmailOrderReader.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

      - name: Build package
        shell: bash
        run: bash scripts/build_macos.sh

      - name: Upload macOS package
        uses: actions/upload-artifact@v7
        with:
          name: email-order-reader-macos
          path: dist/Email Order Reader.app

      - name: Upload direct macOS disk image
        uses: actions/upload-artifact@v7
        with:
          name: EmailOrderReader.dmg
          path: dist/EmailOrderReader.dmg

  build-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download Windows executable
        uses: actions/download-artifact@v8
        with:
          name: EmailOrderReader.exe
          path: release-assets

      - name: Download macOS disk image
        uses: actions/download-artifact@v8
        with:
          name: EmailOrderReader.dmg
          path: release-assets

      - name: Publish direct downloads
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="build-${GITHUB_RUN_NUMBER}"
          gh release create "$tag" \
            "release-assets/EmailOrderReader.exe#EmailOrderReader.exe" \
            "release-assets/EmailOrderReader.dmg#EmailOrderReader.dmg" \
            --title "Email Order Reader ${tag}" \
            --notes "Windows: download EmailOrderReader.exe and double-click to run. macOS: download EmailOrderReader.dmg, open it, then open Email Order Reader.app." \
            --latest
