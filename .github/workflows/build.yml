name: Build Desktop Apps

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

permissions:
  contents: write

jobs:
  test-electron:
    name: Test Electron
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run electron:typecheck

      - name: Run tests
        run: npm run electron:test

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: test-electron
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stamp Electron build info
        run: node scripts/stamp_electron_build_info.mjs "build-${{ github.run_number }}"

      - name: Build Windows installer
        shell: pwsh
        run: npm run electron:build -- --win nsis --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: OrderQuickReadSetup.exe
          path: dist-electron-packages/OrderQuickReadSetup.exe
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-windows
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Download Windows installer
        uses: actions/download-artifact@v8
        with:
          name: OrderQuickReadSetup.exe
          path: release-assets

      - name: Publish direct downloads
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="build-${GITHUB_RUN_NUMBER}"
          gh release create "$tag" \
            "release-assets/OrderQuickReadSetup.exe#OrderQuickReadSetup.exe" \
            --title "Order Quick Read ${tag}" \
            --notes "Windows: download OrderQuickReadSetup.exe and double-click to install." \
            --latest
