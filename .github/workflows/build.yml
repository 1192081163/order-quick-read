name: Build Desktop Apps

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CSC_IDENTITY_AUTO_DISCOVERY: false

permissions:
  contents: write

jobs:
  test-electron:
    name: Test Electron
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run electron:typecheck

      - name: Run tests
        run: npm run electron:test

  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: test-electron
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        shell: pwsh
        run: npm run electron:build -- --win nsis --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: OrderQuickReadSetup.exe
          path: dist-electron-packages/OrderQuickReadSetup.exe
          if-no-files-found: error

  build-macos-x64:
    name: Build macOS Intel DMG
    runs-on: macos-15-intel
    needs: test-electron
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS Intel disk image
        run: npm run electron:build -- --mac dmg --x64 --publish never

      - name: Upload macOS Intel disk image
        uses: actions/upload-artifact@v7
        with:
          name: OrderQuickRead-macos-x64.dmg
          path: dist-electron-packages/OrderQuickRead-macos-x64.dmg
          if-no-files-found: error

  build-macos-arm64:
    name: Build macOS Apple Silicon DMG
    runs-on: macos-latest
    needs: test-electron
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS Apple Silicon disk image
        run: npm run electron:build -- --mac dmg --arm64 --publish never

      - name: Upload macOS Apple Silicon disk image
        uses: actions/upload-artifact@v7
        with:
          name: OrderQuickRead-macos-arm64.dmg
          path: dist-electron-packages/OrderQuickRead-macos-arm64.dmg
          if-no-files-found: error

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos-x64
      - build-macos-arm64
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Download Windows installer
        uses: actions/download-artifact@v8
        with:
          name: OrderQuickReadSetup.exe
          path: release-assets

      - name: Download macOS Intel disk image
        uses: actions/download-artifact@v8
        with:
          name: OrderQuickRead-macos-x64.dmg
          path: release-assets

      - name: Download macOS Apple Silicon disk image
        uses: actions/download-artifact@v8
        with:
          name: OrderQuickRead-macos-arm64.dmg
          path: release-assets

      - name: Publish direct downloads
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="build-${GITHUB_RUN_NUMBER}"
          gh release create "$tag" \
            "release-assets/OrderQuickReadSetup.exe#OrderQuickReadSetup.exe" \
            "release-assets/OrderQuickRead-macos-x64.dmg#OrderQuickRead-macos-x64.dmg" \
            "release-assets/OrderQuickRead-macos-arm64.dmg#OrderQuickRead-macos-arm64.dmg" \
            --title "Order Quick Read ${tag}" \
            --notes "Windows: download OrderQuickReadSetup.exe and double-click to install. macOS Intel: download OrderQuickRead-macos-x64.dmg. macOS Apple Silicon: download OrderQuickRead-macos-arm64.dmg. Unsigned macOS builds may need right-click Open on first launch." \
            --latest
