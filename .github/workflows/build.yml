name: Build Desktop Apps

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Windows
            os: windows-latest
            shell: pwsh
            artifact: email-order-reader-windows
            artifact_path: dist/Email Order Reader
            build_command: .\scripts\build_windows.ps1
          - name: macOS
            os: macos-latest
            shell: bash
            artifact: email-order-reader-macos
            artifact_path: dist/Email Order Reader.app
            build_command: bash scripts/build_macos.sh

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: runner.os != 'Windows'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        if: runner.os != 'Windows'
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q

      - name: Build package
        shell: ${{ matrix.platform.shell }}
        run: ${{ matrix.platform.build_command }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: ${{ matrix.platform.artifact_path }}
