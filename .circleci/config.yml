version: 2.1

orbs:
  win: circleci/windows@5.1.1

jobs:
  test-electron:
    docker:
      - image: cimg/node:24.11
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-linux-v1-{{ checksum "package-lock.json" }}
            - npm-linux-v1-
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-linux-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Typecheck
          command: npm run electron:typecheck
      - run:
          name: Run tests
          command: npm run electron:test

  build-windows:
    executor: win/server-2022
    shell: powershell.exe -ExecutionPolicy Bypass
    environment:
      ELECTRON_CACHE: .cache/electron
      ELECTRON_BUILDER_CACHE: .cache/electron-builder
    steps:
      - checkout
      - restore_cache:
          keys:
            - npm-windows-v1-{{ checksum "package-lock.json" }}
            - npm-windows-v1-
      - restore_cache:
          keys:
            - electron-windows-v1-{{ checksum "package-lock.json" }}
            - electron-windows-v1-
      - run:
          name: Install Node.js
          command: |
            choco install nodejs-lts -y
            Import-Module "$env:ChocolateyInstall\helpers\chocolateyProfile.psm1"
            refreshenv
            node --version
            npm --version
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: npm-windows-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: Stamp Electron build info
          command: node scripts/stamp_electron_build_info.mjs "build-$env:CIRCLE_BUILD_NUM"
      - run:
          name: Build Windows installer
          command: npm run electron:build -- --win nsis --publish never
      - save_cache:
          key: electron-windows-v1-{{ checksum "package-lock.json" }}
          paths:
            - .cache/electron
            - .cache/electron-builder
      - run:
          name: Stage Windows installer
          command: |
            New-Item -ItemType Directory -Force -Path release-assets | Out-Null
            Copy-Item dist-electron-packages/OrderQuickReadSetup.exe release-assets/OrderQuickReadSetup.exe
      - persist_to_workspace:
          root: .
          paths:
            - release-assets/OrderQuickReadSetup.exe
      - store_artifacts:
          path: release-assets/OrderQuickReadSetup.exe
          destination: OrderQuickReadSetup.exe

  publish-release:
    docker:
      - image: cimg/node:24.11
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install GitHub CLI
          command: |
            sudo mkdir -p -m 755 /etc/apt/keyrings
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg >/dev/null
            sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list >/dev/null
            sudo apt-get update
            sudo apt-get install -y gh
      - run:
          name: Publish direct downloads
          command: |
            test -n "$GH_TOKEN"
            tag="build-${CIRCLE_BUILD_NUM}"
            gh release create "$tag" \
              "release-assets/OrderQuickReadSetup.exe#OrderQuickReadSetup.exe" \
              --repo "${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}" \
              --title "Order Quick Read ${tag}" \
              --notes "Windows: download OrderQuickReadSetup.exe and double-click to install." \
              --latest

workflows:
  build_and_release:
    jobs:
      - test-electron
      - build-windows
      - publish-release:
          context: github-release
          filters:
            branches:
              only: main
          requires:
            - test-electron
            - build-windows
